<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Job Exposé</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      min-height: 200px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid #1e293b;
    }
    .header-title { font-size: 14px; font-weight: 800; color: #fff; }
    .header-sub { font-size: 10px; color: #64748b; }
    .badge { font-size: 9px; background: #7c3aed22; border: 1px solid #7c3aed55; color: #a78bfa; padding: 2px 7px; border-radius: 20px; font-weight: 700; letter-spacing: 0.06em; }

    .body { padding: 14px 16px; }

    .tab-bar { display: flex; gap: 4px; margin-bottom: 14px; }
    .tab {
      flex: 1; padding: 7px; border: 1px solid #1e293b; border-radius: 6px;
      background: transparent; color: #64748b; font-size: 11px; font-weight: 600;
      cursor: pointer; text-align: center; transition: all 0.15s;
    }
    .tab.active { background: #7c3aed22; border-color: #7c3aed55; color: #a78bfa; }

    /* Page analysis tab */
    #tab-page .desc { font-size: 11px; color: #94a3b8; margin-bottom: 12px; line-height: 1.5; }
    #tab-page .status-box {
      background: #1e293b; border-radius: 8px; padding: 12px;
      font-size: 11px; color: #94a3b8; line-height: 1.5; text-align: center;
    }
    #tab-page .btn-analyze {
      width: 100%; padding: 10px; background: #7c3aed; color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 700;
      cursor: pointer; margin-top: 10px; transition: background 0.15s;
    }
    #tab-page .btn-analyze:hover { background: #6d28d9; }
    #tab-page .btn-analyze:disabled { background: #334155; color: #64748b; cursor: default; }

    /* Manual tab */
    #tab-manual textarea {
      width: 100%; height: 120px; background: #1e293b; border: 1px solid #334155;
      border-radius: 8px; color: #e2e8f0; font-size: 11px; padding: 10px;
      resize: vertical; font-family: inherit; line-height: 1.5;
    }
    #tab-manual textarea::placeholder { color: #475569; }
    #tab-manual textarea:focus { outline: none; border-color: #7c3aed; }
    #tab-manual .btn-run {
      width: 100%; padding: 10px; background: #7c3aed; color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 700;
      cursor: pointer; margin-top: 10px; transition: background 0.15s;
    }
    #tab-manual .btn-run:hover { background: #6d28d9; }

    /* Settings tab */
    #tab-settings label { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 6px; }
    #tab-settings input {
      width: 100%; background: #1e293b; border: 1px solid #334155;
      border-radius: 8px; color: #e2e8f0; font-size: 11px; padding: 9px 10px;
      font-family: inherit;
    }
    #tab-settings input:focus { outline: none; border-color: #7c3aed; }
    #tab-settings .hint { font-size: 10px; color: #475569; margin-top: 5px; line-height: 1.4; }
    #tab-settings .btn-save {
      margin-top: 12px; width: 100%; padding: 8px; background: #1e293b; color: #a78bfa;
      border: 1px solid #7c3aed55; border-radius: 8px; font-size: 12px; font-weight: 600;
      cursor: pointer;
    }
    #tab-settings .btn-save:hover { background: #7c3aed22; }
    #save-msg { font-size: 10px; color: #4ade80; margin-top: 6px; display: none; }

    /* Result card */
    .result-card { margin-top: 14px; }
    .score-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .score-label { font-size: 10px; font-weight: 700; color: #64748b; letter-spacing: 0.08em; text-transform: uppercase; }
    .score-val { font-size: 28px; font-weight: 900; line-height: 1; }
    .bar-track { height: 6px; background: #1e293b; border-radius: 999px; overflow: hidden; margin-bottom: 4px; }
    .bar-fill { height: 100%; border-radius: 999px; }
    .bar-sub { display: flex; justify-content: space-between; font-size: 9px; color: #475569; margin-bottom: 10px; }
    .rec-badge {
      border-radius: 8px; padding: 8px 12px; margin-bottom: 10px;
    }
    .rec-label { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 3px; }
    .rec-summary { font-size: 10px; color: #cbd5e1; line-height: 1.5; }
    .signals-title { font-size: 10px; font-weight: 700; color: #64748b; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
    .signal-row { display: flex; align-items: flex-start; gap: 6px; padding: 5px 0; border-bottom: 1px solid #1e293b; }
    .signal-icon { font-size: 11px; margin-top: 1px; }
    .signal-label { font-size: 11px; font-weight: 600; color: #e2e8f0; flex: 1; }
    .signal-impact { font-size: 11px; font-weight: 700; white-space: nowrap; }
  </style>
</head>
<body>

<div class="header">
  <span style="font-size:22px;">👻</span>
  <div>
    <div class="header-title">Ghost Job Exposé</div>
    <div class="header-sub">Detect fake postings instantly</div>
  </div>
  <span class="badge" style="margin-left:auto;">BETA</span>
</div>

<div class="body">
  <div class="tab-bar">
    <button class="tab active" data-tab="page">This Page</button>
    <button class="tab" data-tab="manual">Manual</button>
    <button class="tab" data-tab="settings">⚙️ Settings</button>
  </div>

  <!-- Tab: This Page -->
  <div id="tab-page">
    <p class="desc">Analyzes the job posting on the current tab. Works on LinkedIn, Indeed, Greenhouse, Lever, Workday, and Ashby.</p>
    <div id="page-status" class="status-box">Loading page info…</div>
    <button id="btn-analyze-page" class="btn-analyze" disabled>Analyze This Job</button>
    <div id="page-result" class="result-card"></div>
  </div>

  <!-- Tab: Manual Paste -->
  <div id="tab-manual" style="display:none;">
    <textarea id="manual-text" placeholder="Paste a job description here and click Analyze…"></textarea>
    <button id="btn-analyze-manual" class="btn-run">Analyze</button>
    <div id="manual-result" class="result-card"></div>
  </div>

  <!-- Tab: Settings -->
  <div id="tab-settings" style="display:none;">
    <label for="api-url">API URL (optional — enables AI-enhanced analysis)</label>
    <input id="api-url" type="url" placeholder="https://your-app.vercel.app">
    <div class="hint">Deploy your Ghost Job Exposé Next.js app and paste its URL here to unlock AI-powered scoring.</div>
    <button class="btn-save" id="btn-save-settings">Save</button>
    <div id="save-msg">✓ Saved!</div>
  </div>
</div>

<script src="analyzer.js"></script>
<script src="popup.js"></script>
</body>
</html>
